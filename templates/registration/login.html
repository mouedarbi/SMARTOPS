<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | SMARTOPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-sans antialiased">

    <div class="w-full max-w-md p-8">
        <!-- Logo / Brand -->
        <div class="text-center mb-10">
            <div class="h-16 w-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-blue-500/20 mx-auto mb-4">
                <i class="las la-tools text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white">SMARTOPS CORE</h1>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-bold mt-1">Console d'administration sécurisée</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden p-10 border border-white/10">
            <h2 class="text-2xl font-bold text-slate-800 mb-8">Connexion</h2>

            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="mb-6 p-4 bg-red-50 rounded-2xl border border-red-100 text-red-600 text-xs font-bold">
                    Identifiant ou mot de passe incorrect.
                </div>
                {% endif %}

                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 px-1">Identifiant</label>
                        <input type="text" name="username" required class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 font-semibold text-slate-700 transition-all placeholder:text-slate-300" placeholder="Ex: admin">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 px-1">Mot de passe</label>
                        <input type="password" name="password" required class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 font-semibold text-slate-700 transition-all placeholder:text-slate-300" placeholder="••••••••">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all transform hover:scale-[1.02] active:scale-[0.98] mt-4 uppercase tracking-widest text-sm">
                        Entrer dans le système
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center mt-8 text-slate-600 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2026 SMARTOPS CORE - Système Auto-Hébergé.
        </p>
    </div>

</body>
</html>
