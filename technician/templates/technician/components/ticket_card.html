<a href="{% url 'technician_ticket_detail' ticket.id %}" class="block bg-white p-4 rounded-3xl shadow-sm border border-slate-100 active:scale-[0.98] transition-all">
    <div class="flex justify-between items-start mb-3">
        <div class="flex items-center gap-2">
            <span class="text-xs font-mono font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-lg">
                {{ ticket.planned_start|date:"H:i" }}
            </span>
            <span class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">
                ID: #{{ ticket.id }}
            </span>
        </div>
        <span class="h-2 w-2 rounded-full 
            {% if ticket.status == 'done' %}bg-emerald-500
            {% elif ticket.status == 'in_progress' %}bg-blue-500 animate-pulse
            {% elif ticket.status == 'to_reschedule' %}bg-orange-500
            {% elif ticket.status == 'canceled' %}bg-rose-500
            {% else %}bg-slate-300{% endif %}">
        </span>
    </div>

    <h3 class="font-black text-slate-800 leading-tight mb-1 truncate">{{ ticket.equipment.name }}</h3>
    
    <div class="flex items-center gap-2 text-slate-400 mb-4">
        <i class="fas fa-map-marker-alt text-[10px]"></i>
        <span class="text-xs font-bold truncate">{{ ticket.equipment.building.name }} - {{ ticket.equipment.building.city }}</span>
    </div>

    <div class="flex justify-between items-center pt-3 border-t border-slate-50">
        <span class="text-[10px] font-bold uppercase tracking-widest 
            {% if ticket.type == 'emergency' %}text-rose-500{% else %}text-slate-400{% endif %}">
            <i class="fas {% if ticket.type == 'emergency' %}fa-bolt{% else %}fa-check-circle{% endif %} mr-1"></i>
            {{ ticket.get_type_display }}
        </span>
        <i class="fas fa-chevron-right text-slate-200 text-xs"></i>
    </div>
</a>
