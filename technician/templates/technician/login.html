{% extends 'technician/base_technician.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-100px)] p-6">
    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200 w-full max-w-sm border border-slate-100">
        <div class="text-center mb-10">
            <div class="inline-flex h-16 w-16 bg-blue-50 text-blue-600 rounded-2xl items-center justify-center text-2xl mb-4">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">Zone Technicien</h2>
            <p class="text-slate-400 text-sm">Veuillez vous authentifier</p>
        </div>

        <form method="post" action="." class="space-y-5">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Identifiant</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-300">
                        <i class="fas fa-user text-sm"></i>
                    </span>
                    <input type="text" name="username" required
                           class="w-full pl-12 pr-4 py-3.5 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none text-slate-800 font-medium"
                           placeholder="Ex: mohamed.o">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Mot de passe</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-300">
                        <i class="fas fa-key text-sm"></i>
                    </span>
                    <input type="password" name="password" required
                           class="w-full pl-12 pr-4 py-3.5 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none text-slate-800 font-medium"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                <span>SE CONNECTER</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>
        
        <p class="mt-8 text-center text-[10px] text-slate-300 font-bold uppercase tracking-tighter">
            &copy; 2026 SMARTOPS SYSTEM - SOUVERAINETÉ NUMÉRIQUE
        </p>
    </div>
</div>
{% endblock %}
